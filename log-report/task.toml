artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Requires parsing an Apache access log to compute total request counts, unique IP counts, and top requested paths, and outputting the summary in a strictly structured JSON file."
solution_explanation = "Read the log file `/app/access.log` line-by-line, parse the IP and HTTP request path using regex, collect counts, and dump the metrics as JSON to `/app/report.json`."
verification_explanation = "Verify `/app/report.json` exists, is valid JSON, contains all required keys (`total_requests`, `unique_ips`, `top_path`), and matches the exact computed metrics from the log file."

